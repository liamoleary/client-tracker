<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Time Tracker</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#1d2b55" />

    <!-- iOS home-screen / standalone mode -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Tracker" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />

    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>

    <!-- Active timer sticky banner -->
    <div id="active-banner" role="status" aria-live="polite">
      <div class="banner-info">
        <span class="timer-label">
          ⏱ <span class="project-name" id="banner-project"></span>
          &mdash; <span class="elapsed" id="banner-elapsed">00:00:00</span>
        </span>
        <span class="banner-started" id="banner-started"></span>
      </div>
      <button class="btn-danger" id="banner-stop-btn" type="button">Stop</button>
    </div>

    <div class="container">
      <h1>Time Tracker</h1>

      <!-- Ephemeral storage warning (shown only when the server reports it) -->
      <section id="storage-warning" class="danger-banner" hidden>
        <div class="danger-title">⚠ Your data is not being saved</div>
        <p id="storage-warning-body"></p>
        <div class="danger-actions">
          <a class="btn-secondary" id="backup-download-btn" href="/api/backup"
             download>Download backup now</a>
        </div>
      </section>

      <!-- Push notifications prompt -->
      <section id="notifications-banner" hidden aria-label="Notifications">
        <p>Enable notifications to get hourly check-ins.</p>
        <button class="btn-secondary" id="enable-notifications-btn" type="button">
          Enable Notifications
        </button>
      </section>
      <p id="notifications-status"></p>

      <!-- Add project -->
      <div class="add-project">
        <input
          type="text"
          id="new-project-input"
          placeholder="New project name"
          autocomplete="off"
          maxlength="80"
          aria-label="New project name"
        />
        <button class="btn-primary" id="add-project-btn" type="button">Add</button>
      </div>

      <!-- Project list -->
      <section id="projects-section">
        <h2>Projects</h2>
        <div id="project-list"></div>
        <p id="empty-state" hidden>No projects yet. Add one above.</p>
      </section>

      <footer id="footer" class="app-footer">
        <a href="/api/backup" download>Download backup (.json)</a>
        <span id="storage-footer"></span>
      </footer>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
